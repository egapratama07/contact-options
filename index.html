<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Opsi Kontak</title>
    <style>
        body {
            background-color: white; /* Latar belakang halaman putih */
            font-family: Arial, sans-serif;
            margin: 0;
        }
        header {
            background-color: #007B7F; /* Warna biru laut untuk header */
            padding: 20px;
            text-align: center;
            color: white; /* Warna teks putih untuk kontras */
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Mengatur sejajar di atas */
            flex-direction: column;
            margin-top: 50px;
        }
        .box {
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px; /* Jarak antar kotak */
            background-color: #f9f9f9;
        }
        .whatsapp {
            border: 2px solid #25D366; /* Border warna hijau WhatsApp */
        }
        .outlook {
            border: 2px solid #0078D4; /* Border warna biru Outlook */
        }
        .icon {
            margin: 10px 0; /* Jarak atas dan bawah untuk ikon */
        }
        img {
            width: 80px; /* Ukuran gambar logo */
            height: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>CONTACT PERSON</h1>
</header>

<div class="container">
    <div class="box whatsapp">
        <div class="icon">
            <a href="https://wa.me/6285811108994" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            </a>
        </div>
        <h2>WhatsApp</h2>
    </div>

    <div class="box outlook">
        <div class="icon">
            <a href="mailto:pratama.ega@outlook.com">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Outlook.com_logo.svg" alt="Outlook">
            </a>
        </div>
        <h2>Outlook</h2>
    </div>
</div>

</body>
</html>
