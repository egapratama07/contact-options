<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Bio</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
}

.wrapper {
    width: 100%;
    max-width: 420px;
    padding: 30px 20px;
    text-align: center;
}

.profile {
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeDown 0.8s ease forwards;
}

.profile img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    margin-bottom: 15px;
}

.links {display:flex;flex-direction:column;gap:12px;}

.link {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:500;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.3s ease;
    opacity: 0;
    transform: translateY(20px);
}

.link:nth-child(1){animation: fadeUp 0.6s ease forwards 0.3s;}
.link:nth-child(2){animation: fadeUp 0.6s ease forwards 0.5s;}
.link:nth-child(3){animation: fadeUp 0.6s ease forwards 0.7s;}

.link:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-3px) scale(1.02);
}

.icon {
    width: 22px;
    height: 22px;
}

footer {
    margin-top:30px;
    font-size:12px;
    opacity:0.5;
}

@keyframes fadeDown {
    from {opacity:0; transform:translateY(-20px);} 
    to {opacity:1; transform:translateY(0);} 
}

@keyframes fadeUp {
    to {opacity:1; transform:translateY(0);} 
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="profile">
        <img src="https://i.pravatar.cc/150" alt="profile">
        <h1>Ega Pratama</h1>
        <p>Hubungi saya melalui platform berikut</p>
    </div>

    <div class="links">

        <a class="link" href="https://wa.me/6285811108994" target="_blank">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png"/>
            WhatsApp
        </a>

        <a class="link" href="mailto:pratama.ega@outlook.com">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/new-post.png"/>
            Email
        </a>

        <a class="link" href="#">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/instagram-new.png"/>
            Instagram
        </a>

    </div>

    <footer>
        © 2026 - Link Bio
    </footer>

</div>

</body>
</html>
