<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Person</title>
    <style>
        body {
            background-color: white; /* Latar belakang halaman putih */
            font-family: Arial, sans-serif;
            margin: 0;
        }
        header {
            background-color: #007B7F; /* Warna biru laut untuk header */
            padding: 20px;
            text-align: center;
            color: white; /* Warna teks putih untuk kontras */
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center; /* Mengatur sejajar di tengah */
            flex-direction: column;
            margin-top: 50px;
        }
        .box {
            display: flex;
            align-items: center; /* Menyelaraskan logo dan teks secara horizontal */
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            margin: 10px; /* Jarak antar kotak */
            width: 300px; /* Lebar kotak */
            color: white; /* Teks berwarna putih */
        }
        .whatsapp {
            background-color: #25D366; /* Latar belakang warna hijau WhatsApp */
        }
        .outlook {
            background-color: #0078D4; /* Latar belakang warna biru Outlook */
        }
        .icon {
            margin-right: 10px; /* Jarak antara logo dan teks */
        }
        img {
            width: 50px; /* Ukuran gambar logo */
            height: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>CONTACT PERSON</h1>
</header>

<div class="container">
    <div class="box whatsapp">
        <div class="icon">
            <a href="https://wa.me/6285811108994" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            </a>
        </div>
        <h2>WhatsApp</h2>
    </div>

    <div class="box outlook">
        <div class="icon">
            <a href="mailto:pratama.ega@outlook.com">
                <img src="https://upload.wikimedia.org/wikipedia/commons/f/fb/Outlook.com_logo.svg" alt="Outlook">
            </a>
        </div>
        <h2>Outlook</h2>
    </div>
</div>

</body>
</html>
