<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ega Pratama</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    color:white;
}

.wrapper{
    width:100%;
    max-width:420px;
    padding:30px 20px;
    text-align:center;
}

.profile{
    margin-bottom:30px;
    animation:fadeDown .8s ease forwards;
}

.profile img{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,.2);
}

.profile h1{
    margin-top:10px;
    font-size:22px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:14px;
}

.link{
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:15px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    transition:.3s;
    opacity:0;
    transform:translateY(20px);
}

.link:nth-child(1){animation:fadeUp .5s ease forwards .2s}
.link:nth-child(2){animation:fadeUp .5s ease forwards .4s}
.link:nth-child(3){animation:fadeUp .5s ease forwards .6s}

/* Hover brand */
.whatsapp:hover{background:#25D366;}
.email:hover{background:#0078D4;}
.linkedin:hover{background:#0A66C2;}

.link:hover{
    transform:translateY(-3px) scale(1.02);
}

.icon{
    width:22px;
}

/* Ripple */
.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple .6s linear;
    background:rgba(255,255,255,0.5);
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

@keyframes fadeDown{
    from{opacity:0;transform:translateY(-20px)}
    to{opacity:1;transform:translateY(0)}
}

@keyframes fadeUp{
    to{opacity:1;transform:translateY(0)}
}

footer{
    margin-top:30px;
    font-size:12px;
    opacity:.5;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="profile">
        <img src="profile.jpg" alt="profile">
        <h1>Ega Pratama</h1>
    </div>

    <div class="links">

        <a class="link whatsapp" href="https://wa.me/6285811108994" target="_blank">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png"/>
            WhatsApp
        </a>

        <a class="link email" href="mailto:pratama.ega@outlook.com">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/new-post.png"/>
            Email
        </a>

        <a class="link linkedin" href="https://www.linkedin.com/in/ega-pratama-876841366/" target="_blank">
            <img class="icon" src="https://img.icons8.com/ios-filled/50/ffffff/linkedin.png"/>
            LinkedIn
        </a>

    </div>

    <footer>© 2026</footer>

</div>

<script>
document.querySelectorAll('.link').forEach(button => {
  button.addEventListener('click', function (e) {
    const circle = document.createElement('span');
    const diameter = Math.max(this.clientWidth, this.clientHeight);
    const radius = diameter / 2;

    circle.style.width = circle.style.height = diameter + 'px';
    circle.style.left = (e.offsetX - radius) + 'px';
    circle.style.top = (e.offsetY - radius) + 'px';
    circle.classList.add('ripple');

    const ripple = this.getElementsByClassName('ripple')[0];
    if (ripple) ripple.remove();

    this.appendChild(circle);
  });
});
</script>

</body>
</html>
