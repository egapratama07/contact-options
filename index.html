<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Bio</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
}

.wrapper {
    width: 100%;
    max-width: 420px;
    padding: 30px 20px;
    text-align: center;
}

.profile {
    margin-bottom: 30px;
    animation: fadeDown 1s ease;
}

.profile img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    margin-bottom: 15px;
}

.profile h1 {font-size: 22px;}
.profile p {font-size: 14px;opacity: 0.6;margin-top: 5px;}

.links {display:flex;flex-direction:column;gap:12px;}

.link {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:14px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:500;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.25s ease;
    animation: fadeUp 0.8s ease;
}

.link:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-2px);
}

.link svg {
    width:20px;
    height:20px;
    stroke: white;
}

footer {
    margin-top:30px;
    font-size:12px;
    opacity:0.5;
}

@keyframes fadeDown {
    from {opacity:0; transform:translateY(-20px);} 
    to {opacity:1; transform:translateY(0);} 
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(20px);} 
    to {opacity:1; transform:translateY(0);} 
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="profile">
        <img src="https://i.pravatar.cc/150" alt="profile">
        <h1>Ega Pratama</h1>
        <p>Hubungi saya melalui platform berikut</p>
    </div>

    <div class="links">

        <a class="link" href="https://wa.me/6285811108994" target="_blank">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-16.32-5.32L3 21l6.32-1.68A9 9 0 1021 12z"/>
            </svg>
            WhatsApp
        </a>

        <a class="link" href="mailto:pratama.ega@outlook.com">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 7.5v9a2.25 2.25 0 01-2.25 2.25h-15A2.25 2.25 0 012.25 16.5v-9m19.5 0L12 13.5 2.25 7.5"/>
            </svg>
            Email
        </a>

        <a class="link" href="#">
            <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 2.25h9A5.25 5.25 0 0121.75 7.5v9A5.25 5.25 0 0116.5 21.75h-9A5.25 5.25 0 012.25 16.5v-9A5.25 5.25 0 017.5 2.25z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 11.25a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/>
            </svg>
            Instagram
        </a>

    </div>

    <footer>
        © 2026 - Link Bio
    </footer>

</div>

</body>
</html>
