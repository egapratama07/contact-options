<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Opsi Kontak</title>
    <style>
        body {
            background-color: white; /* Latar belakang halaman putih */
            font-family: Arial, sans-serif;
            margin: 0;
        }
        header {
            background-color: #ADD8E6; /* Warna biru muda untuk header */
            padding: 20px;
            text-align: center;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin-top: 50px;
        }
        .box {
            border: 2px solid #25D366; /* Border warna hijau WhatsApp */
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #f9f9f9;
        }
        .icon {
            margin: 10px;
            cursor: pointer;
        }
        img {
            width: 80px; /* Ukuran gambar logo */
            height: auto;
        }
    </style>
</head>
<body>

<header>
    <h1>Pilih Opsi Kontak</h1>
</header>

<div class="container">
    <div class="box">
        <div class="icon">
            <a href="https://wa.me/085811108994" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
            </a>
        </div>

        <div class="icon">
            <a href="mailto:pratama.ega@outlook.com">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Outlook.com_logo.svg" alt="Outlook">
            </a>
        </div>
    </div>
</div>

</body>
</html>
